<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0b0e14;color:#e2e8f0;font-family:'Inter','Segoe UI',system-ui,sans-serif}
a{color:#4f8ef7;text-decoration:none}a:hover{color:#34d399}
.bar{background:rgba(11,14,20,0.9);backdrop-filter:blur(12px);border-bottom:1px solid #2a3040;padding:12px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.bar a{font-size:12px;color:#8892a4;font-weight:500}.bar .b{color:#4f8ef7;font-weight:700;font-size:14px}
.pg{padding:28px 16px 48px;text-align:center}
h1{font-size:22px;font-weight:800;margin-bottom:4px}

.wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;padding:8px 0}
.wrap svg{display:block;margin:0 auto}
.ref{margin-top:18px}
.btn{display:inline-block;padding:7px 16px;border-radius:6px;font-size:11px;font-weight:600;border:1px solid #2a3040;color:#4f8ef7;background:transparent}

html.light {
  --bg: #f8f9fb; --surface: #ffffff; --card: #ffffff;
  --border: #e2e5ea; --accent: #2563eb; --accent2: #059669;
  --text: #1e293b; --muted: #64748b; --dim: #94a3b8;
}
html.light .top-bar { background:rgba(248,249,251,0.92); }
html.light .math { background:#f1f5f9; border-color:#e2e5ea; }

.theme-btn { background:none;border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:4px 8px;font-size:12px;cursor:pointer;transition:all 0.2s; }
.theme-btn:hover { border-color:var(--accent);color:var(--accent); }
</style>

<body>
<div class="bar"><a href="./" class="b">Dr. Anuj Modi</a><a href="./#education">← Back</a></div>
<div class="pg">
<h1>Academic Family Tree</h1>
<div class="sub">Doctoral advisor lineage — Electrical Engineering & Electromagnetics</div>
<div class="wrap"><svg id="svg" xmlns="http://www.w3.org/2000/svg"></svg></div>
<div class="ref"><a href="https://academictree.org/etree/tree.php?pid=873422&pnodecount=10&cnodecount=3&fontsize=1" target="_blank" class="btn">View Full Interactive Tree on academictree.org ↗</a></div>
</div>
<footer>© 2026 Dr. Anuj Modi · anujyrmodi@gmail.com</footer>
<script>
// Academic tree data — each row is a generation, rendered top to bottom
// Based on academictree.org/etree pid=873422
var generations = [
  // Gen 0 — earliest known ancestor in the direct chain
  [{ name: 'Carl Friedrich Gauss', inst: 'Universität Göttingen', year: '1799' }],
  [{ name: 'Christian Ludwig Gerling', inst: 'Universität Göttingen', year: '1812' }],
  [{ name: 'Julius Plücker', inst: 'Universität Marburg', year: '1823' }],
  [{ name: 'Felix Klein', inst: 'Universität Bonn', year: '1868' }],
  [{ name: 'William E. Story', inst: 'Universität Leipzig', year: '1875' }],
  [{ name: 'Solomon Lefschetz', inst: 'Clark University', year: '1911' }],
  [{ name: 'Albert William Tucker', inst: 'Princeton University', year: '1932' }],
  [{ name: 'John D. Kraus', inst: 'University of Michigan', year: '1933' }],
  [{ name: 'Thomas E. Tice', inst: 'Ohio State University', year: '' }],
  [{ name: 'Leon Peters Jr.', inst: 'Ohio State University', year: '' }],
  [{ name: 'Constantine A. Balanis', inst: 'Arizona State University', year: '' }],
  [{ name: 'Anuj Y. Modi', inst: 'Arizona State University', year: '2020', me: true }]
];

// Layout constants
var NW = 200, NH = 44, VGAP = 52, PAD = 40;
var totalH = generations.length * (NH + VGAP) + PAD * 2;
var svgW = NW + PAD * 2;
var svgH = totalH;

var svg = document.getElementById('svg');
svg.setAttribute('width', svgW);
svg.setAttribute('height', svgH);
svg.setAttribute('viewBox', '0 0 ' + svgW + ' ' + svgH);

function el(tag, attrs, text) {
  var e = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (var k in attrs) e.setAttribute(k, attrs[k]);
  if (text) e.textContent = text;
  return e;
}

// Background
svg.appendChild(el('rect', {width: svgW, height: svgH, fill: '#0b0e14', rx: 8}));

var cx = svgW / 2;

generations.forEach(function(gen, gi) {
  var y = PAD + gi * (NH + VGAP);
  var node = gen[0];
  var nx = cx - NW / 2;
  var isMe = node.me;

  // Connector line from previous node
  if (gi > 0) {
    var prevY = PAD + (gi - 1) * (NH + VGAP) + NH;
    svg.appendChild(el('line', {
      x1: cx, y1: prevY, x2: cx, y2: y,
      stroke: isMe ? '#4f8ef7' : '#2a3040', 'stroke-width': isMe ? 2 : 1.5,
      'stroke-dasharray': isMe ? 'none' : '4,3'
    }));
    // Arrow tip
    svg.appendChild(el('polygon', {
      points: cx + ',' + y + ' ' + (cx-5) + ',' + (y-8) + ' ' + (cx+5) + ',' + (y-8),
      fill: isMe ? '#4f8ef7' : '#2a3040'
    }));
  }

  // Node box
  var fill = isMe ? '#4f8ef7' : '#1a1f2b';
  var stroke = isMe ? '#4f8ef7' : (gi >= 7 ? '#4f8ef755' : '#2a3040');
  var sw = isMe ? 0 : 1;
  svg.appendChild(el('rect', {x: nx, y: y, width: NW, height: NH, rx: 6, fill: fill, stroke: stroke, 'stroke-width': sw}));

  // Name
  var nameColor = isMe ? '#fff' : '#e2e8f0';
  var nameEl = el('text', {
    x: cx, y: y + (node.inst ? 17 : 24),
    'text-anchor': 'middle', fill: nameColor,
    'font-size': '12', 'font-weight': '600',
    'font-family': 'Inter,Segoe UI,system-ui,sans-serif'
  }, node.name);
  svg.appendChild(nameEl);

  // Institution
  if (node.inst) {
    var instColor = isMe ? 'rgba(255,255,255,0.75)' : '#5a6478';
    svg.appendChild(el('text', {
      x: cx, y: y + 31,
      'text-anchor': 'middle', fill: instColor,
      'font-size': '10', 'font-family': 'Inter,Segoe UI,system-ui,sans-serif'
    }, node.inst + (node.year ? ' · ' + node.year : '')));
  }
});
</script>

<script>
function toggleTheme() {
  var html = document.documentElement;
  var isLight = html.classList.toggle('light');
  localStorage.setItem('theme', isLight ? 'light' : 'dark');
  document.getElementById('themeBtn').textContent = isLight ? '\u263d' : '\u263e';
}
(function() {
  var saved = localStorage.getItem('theme');
  if (saved === 'light') {
    document.documentElement.classList.add('light');
    var btn = document.getElementById('themeBtn');
    if (btn) btn.textContent = '\u263d';
  }
})();
</script>
</body>
